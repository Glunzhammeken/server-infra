---
- name: Installér pakker til automatiske opdateringer
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
      - needrestart
    state: present
    update_cache: true

- name: Konfigurér needrestart til ikke-interaktiv tilstand
  ansible.builtin.copy:
    content: |
      $nrconf{restart} = 'a';
      $nrconf{kernelhints} = 0;
    dest: /etc/needrestart/conf.d/99-attitude-it.conf
    owner: root
    group: root
    mode: "0644"

- name: Læg apt periodic-konfiguration ud (statisk)
  ansible.builtin.copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  notify: Genstart unattended-upgrades

- name: Læg unattended-upgrades-konfiguration ud fra skabelon
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  notify: Genstart unattended-upgrades

- name: Aktivér ændringer nu før verifikation
  ansible.builtin.meta: flush_handlers

- name: Sørg for at unattended-upgrades kører og starter ved boot
  ansible.builtin.systemd_service:
    name: unattended-upgrades
    state: started
    enabled: true

# Verifikation
- name: Verificér unattended-upgrades-konfiguration med dry-run
  ansible.builtin.command: unattended-upgrade --dry-run
  register: uu_dryrun
  changed_when: false
  failed_when: uu_dryrun.rc != 0